<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>读书班时间投票</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- 头部 -->
    <header class="header">
      <div class="header-icon">📖</div>
      <h1>《中华优秀传统文化导论》<br>课程配套读书班</h1>
      <p class="subtitle">投票确定每场读书班的时间安排</p>
      <div class="notice">
        <strong>📌 说明</strong>
        <ul>
          <li>自愿参加，<strong>至少参加一场</strong>，多选不限</li>
          <li>每场选一个你方便的时间，得票最多的即为最终安排</li>
          <li>现场会签到，记入平时成绩</li>
          <li class="highlight">投票即视为确认参加，请确定能到场再提交</li>
          <li>若出现平票，优先选定晚间（20:00以后）场次</li>
        </ul>
      </div>
    </header>

    <!-- 投票区 -->
    <div id="voteArea">
      <div id="sessionsContainer">
        <!-- JS动态渲染 -->
      </div>

      <div class="action-bar">
        <p id="selectedHint" class="selected-hint">还未选择任何场次</p>
        <button id="submitBtn" class="btn-primary" disabled>
          <span>提交投票</span>
        </button>
        <p id="statusMsg" class="status-msg"></p>
      </div>
    </div>

    <!-- 结果区 -->
    <div id="resultArea" class="hidden">
      <div class="result-header">
        <div class="result-icon">🏆</div>
        <h2>投票结果</h2>
        <p class="result-subtitle">票数最多的时间即为该场最终安排</p>
      </div>
      <div id="resultsContainer">
        <!-- JS动态渲染 -->
      </div>
      <div class="action-bar">
        <button id="refreshBtn" class="btn-secondary">🔄 刷新结果</button>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <p>每人仅统计一次投票，以现场签到为准</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
